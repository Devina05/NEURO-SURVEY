<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
  .tab-bar { display:flex; gap:8px; margin-bottom:16px; }
  .tab { padding:8px 16px; border-radius:6px; cursor:pointer; border:1px solid #e6e9ef; background:white; color:#0f172a; font-size:14px; }
  .tab.active { background:#4f46e5; color:white; border-color:#4f46e5; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #e6e9ef; font-size:13px; }
  th { background:#f8fafc; font-weight:500; color:#64748b; }
  .badge { padding:3px 8px; border-radius:4px; font-size:12px; font-weight:500; }
  .badge-ai { background:#ede9fe; color:#5b21b6; }
  .badge-nonai { background:#dcfce7; color:#166534; }
  .badge-yes { background:#dcfce7; color:#166534; }
  .badge-no { background:#fee2e2; color:#991b1b; }
  .badge-ins { background:#f1f5f9; color:#64748b; }
  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .stat-card { background:white; padding:16px; border-radius:8px; box-shadow:0 6px 18px rgba(2,6,23,0.06); }
  .stat-card .label { font-size:12px; color:#64748b; margin-bottom:4px; }
  .stat-card .val { font-size:24px; font-weight:500; color:#0f172a; }
  .login-box { max-width:360px; margin:80px auto; }
  #mainContent { display:none; }
  .mono { font-family:monospace; font-size:12px; }
  .section { display:none; }
  .section.active { display:block; }
</style>
</head>

<body>
<div class="container">

  <!-- LOGIN GATE -->
  <div id="loginBox" class="login-box">
    <h2>Admin Access</h2>
    <div class="card">
      <label>Admin Key</label>
      <input id="keyInput" type="password" class="input" placeholder="Enter admin key"/>
      <button class="btn" onclick="checkKey()" style="margin-top:8px; width:100%">
        Enter
      </button>
      <p id="keyError" class="small" style="color:#e11d48; margin-top:8px; display:none;">
        Wrong key
      </p>
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="mainContent">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2 style="margin:0;">Admin Dashboard</h2>
      <button class="btn" onclick="logout()" 
        style="background:#f1f5f9; color:#64748b; font-size:13px;">
        Logout
      </button>
    </div>

    <!-- STAT CARDS -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Total participants</div>
        <div class="val" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="label">AI group</div>
        <div class="val" id="statAI">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Non-AI group</div>
        <div class="val" id="statNonAI">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Completed both days</div>
        <div class="val" id="statDone">—</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
  <button class="tab active" onclick="switchTab('participants')">
    Participants
  </button>
  <button class="tab" onclick="switchTab('analysis')">
    Hypothesis Analysis
  </button>
  <button class="tab" onclick="switchTab('dropout')">
    Dropout Tracking
  </button>
</div>

    <!-- PARTICIPANTS TABLE -->
    <div id="section-participants" class="section active">
      <div id="participantsRoot">
        <div class="card small">Loading...</div>
      </div>
    </div>

    <!-- ANALYSIS SECTION -->
    <div id="section-analysis" class="section">
      <button class="btn" onclick="loadAnalysis()" style="margin-bottom:16px;">
  Run Analysis
</button>
<button onclick="downloadCSV()" 
  style="margin-bottom:16px; margin-left:8px; padding:8px 12px; 
  border-radius:6px; border:1px solid #e6e9ef; background:white; 
  cursor:pointer; font-size:14px;">
  Download CSV
</button>
      <div id="analysisRoot"></div>
    </div>
     <!-- DROPOUT SECTION -->
    <div id="section-dropout" class="section">
      <div id="dropoutRoot">
        <div class="card small">Loading...</div>
      </div>
    </div>

  </div>
</div>

  </div>
</div>

<script>
const API = "http://localhost:4000/api";
const ADMIN_KEY = "devina123";

// ── Auth ──
function checkKey() {
  const val = document.getElementById('keyInput').value;
  if (val === ADMIN_KEY) {
    sessionStorage.setItem('adminAuth', 'true');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadParticipants();
  } else {
    document.getElementById('keyError').style.display = 'block';
  }
}

function logout() {
  sessionStorage.removeItem('adminAuth');
  location.reload();
}

// Auto-login if already authenticated this session
window.onload = () => {
  if (sessionStorage.getItem('adminAuth') === 'true') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadParticipants();
  }

  // Allow pressing Enter on key input
  document.getElementById('keyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkKey();
  });
};

// ── Tabs ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('section-' + name).classList.add('active');

  if (name === 'dropout') loadDropout();
}

// ── Load Participants ──
async function loadParticipants() {
  const res = await fetch(API + '/admin/all', {
    headers: { "adminkey": ADMIN_KEY }
  });
  const data = await res.json();

  // Update stat cards
  const ai = data.filter(p => p.group === 'ai');
  const nonai = data.filter(p => p.group === 'nonai');
  const done = data.filter(p => p.day1Score != null && p.day2Score != null);

  document.getElementById('statTotal').innerText = data.length;
  document.getElementById('statAI').innerText = ai.length;
  document.getElementById('statNonAI').innerText = nonai.length;
  document.getElementById('statDone').innerText = done.length;

  // Build table
  let html = `
    <div class="card" style="padding:0; overflow:hidden;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Group</th>
            <th>Category</th>
            <th>Initial</th>
            <th>Day 1</th>
            <th>Day 2</th>
            <th>Drop</th>
          </tr>
        </thead>
        <tbody>
  `;

  data.forEach(p => {
    const drop = (p.day1Score != null && p.day2Score != null)
      ? (p.day1Score - p.day2Score)
      : '—';
    const dropColor = typeof drop === 'number'
      ? (drop > 0 ? 'color:#e11d48' : 'color:#16a34a')
      : '';

    html += `
      <tr>
        <td>${p.name}</td>
        <td class="small">${p.email}</td>
        <td>
          <span class="badge ${p.group === 'ai' ? 'badge-ai' : 'badge-nonai'}">
            ${p.group ?? '—'}
          </span>
        </td>
        <td>${p.category ?? '—'}</td>
        <td>${p.initialScore ?? '—'}</td>
        <td>${p.day1Score ?? '—'}</td>
        <td>${p.day2Score ?? '—'}</td>
        <td style="font-weight:500; ${dropColor}">${drop}</td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  document.getElementById('participantsRoot').innerHTML = html;
}

// ── Load Analysis ──
async function loadAnalysis() {
  document.getElementById('analysisRoot').innerHTML =
    "<div class='card small'>Running analysis...</div>";

  const res = await fetch(API + '/admin/analysis/full', {
    headers: { "adminkey": ADMIN_KEY }
  });
  const d = await res.json();

  if (d.error) {
    document.getElementById('analysisRoot').innerHTML =
      `<div class='card'>${d.error}</div>`;
    return;
  }

  const rows = [
    {
      id: 'H1',
      label: 'AI group shows greater retention drop',
      note: 'Mean A = AI drop | Mean B = Non-AI drop',
      meanA: d.H1.meanA,
      meanB: d.H1.meanB,
      t: d.H1.t,
      p: d.H1.p,
      result: d.H1.interpretation
    },
    {
      id: 'H2',
      label: 'AI group scores higher on Day 1',
      note: 'Mean A = AI Day 1 | Mean B = Non-AI Day 1',
      meanA: d.H2.meanA,
      meanB: d.H2.meanB,
      t: d.H2.t,
      p: d.H2.p,
      result: d.H2.interpretation
    },
    {
      id: 'H3',
      label: 'Non-AI group outperforms on Day 2',
      note: 'Mean A = Non-AI Day 2 | Mean B = AI Day 2',
      meanA: d.H3.meanA,
      meanB: d.H3.meanB,
      t: d.H3.t,
      p: d.H3.p,
      result: d.H3.interpretation
    },
    {
      id: 'H4',
      label: 'Lower baseline = more retention loss',
      note: 'Correlation in AI group only',
      meanA: d.H4.correlation ?? '—',
      meanB: '—',
      t: '—',
      p: '—',
      result: d.H4.interpretation
    }
  ];

  function badgeClass(r) {
    if (r.includes('Supported') && !r.includes('Not')) return 'badge-yes';
    if (r.includes('Not')) return 'badge-no';
    return 'badge-ins';
  }

  let html = `
    <div class="card" style="padding:0; overflow:hidden; margin-bottom:12px;">
      <table>
        <thead>
          <tr>
            <th>Hypothesis</th>
            <th>Mean A</th>
            <th>Mean B</th>
            <th>t-value</th>
            <th>p-value</th>
            <th>Verdict</th>
          </tr>
        </thead>
        <tbody>
  `;

  rows.forEach(r => {
    html += `
      <tr>
        <td>
          <div style="font-weight:500">${r.id} — ${r.label}</div>
          <div class="small">${r.note}</div>
        </td>
        <td class="mono">${r.meanA ?? '—'}</td>
        <td class="mono">${r.meanB ?? '—'}</td>
        <td class="mono">${r.t ?? '—'}</td>
        <td class="mono">${r.p ?? '—'}</td>
        <td><span class="badge ${badgeClass(r.result)}">${r.result}</span></td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;

  // H4 category breakdown
  html += `
    <div class="card">
      <strong>H4 — Retention drop by baseline category</strong>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:12px;">
        ${['low','med','high'].map(cat => `
          <div style="background:#f8fafc; padding:12px; border-radius:8px; text-align:center;">
            <div class="small" style="text-transform:uppercase; font-size:11px; margin-bottom:4px;">
              ${cat}
            </div>
            <div style="font-size:20px; font-weight:500;">
              ${d.H4_byCategory[cat]?.avgDrop ?? '—'}
            </div>
            <div class="small">n = ${d.H4_byCategory[cat]?.n ?? 0}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="small" style="margin-top:8px;">
      Generated at: ${new Date(d.generatedAt).toLocaleString()} 
      &nbsp;·&nbsp; p &lt; 0.05 = significant
    </div>
  `;

  document.getElementById('analysisRoot').innerHTML = html;
}
async function downloadCSV() {
  const res = await fetch(API + '/admin/all', {
    headers: { "adminkey": ADMIN_KEY }
  });
  const data = await res.json();

  const headers = [
    "Name", "Email", "Group", "Category",
    "Initial Score", "Day 1 Score", "Day 2 Score", "Drop"
  ];

  const rows = data.map(p => {
    const drop = (p.day1Score != null && p.day2Score != null)
      ? (p.day1Score - p.day2Score)
      : '';
    return [
      p.name,
      p.email,
      p.group ?? '',
      p.category ?? '',
      p.initialScore ?? '',
      p.day1Score ?? '',
      p.day2Score ?? '',
      drop
    ].join(',');
  });

  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'neuro_survey_data.csv';
  a.click();
  URL.revokeObjectURL(url);
}
async function loadDropout() {
  const res = await fetch(API + '/admin/dropout', {
    headers: { "adminkey": ADMIN_KEY }
  });
  const d = await res.json();

  const stages = [
    { label: "Signed up", val: d.total, drop: null },
    { label: "Completed initial quiz", val: d.total - d.signedUp, drop: d.signedUp },
    { label: "Assigned to group", val: d.total - d.signedUp - d.initialDone, drop: d.initialDone },
    { label: "Completed Day 1", val: d.day1Done + d.day2Done, drop: d.assigned },
    { label: "Completed Day 2", val: d.day2Done, drop: d.dropAfterDay1 }
  ];

  let html = `
    <div class="card" style="margin-bottom:12px;">
      <strong>Overall completion rate: ${d.completionRate}%</strong>
      <div class="small">
        Total signed up: ${d.total} | 
        Fully completed: ${d.day2Done}
      </div>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <table>
        <thead>
          <tr>
            <th>Stage</th>
            <th>Reached this stage</th>
            <th>Dropped off here</th>
          </tr>
        </thead>
        <tbody>
  `;

  stages.forEach(s => {
    html += `
      <tr>
        <td>${s.label}</td>
        <td>${s.val}</td>
        <td style="color:${s.drop > 0 ? '#e11d48' : '#64748b'}">
          ${s.drop !== null ? s.drop : '—'}
        </td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  document.getElementById('dropoutRoot').innerHTML = html;
}
</script>

</body>
</html>
