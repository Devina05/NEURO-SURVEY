<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Initial Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">
  <h2>Initial Quiz</h2>

  <div id="quizRoot" class="card"></div>
</div>

<script src="js/common.js"></script>

<script>
// Full detailed questions:
///const API = require("./js/common.js").API;
const QUESTIONS = [
  {
    id: "q1",
    text: " Pattern Progression Reasoning",
    description: `
2, 5, 11, 23, 47, ?

A) 71
B) 85
C) 95
D) 99
`,
    choices: ["Option A", "Option B", "Option C", "Option D"],
    answer: "Option C"
  },

  {
    id: "q2",
    text: "Directional and Spatial Reasoning",
    description: `
A person walks 8 metres north, then 6 metres east, then 8 metres south.

Where is the person now relative to the starting point?

A) 6 metres east
B) 6 metres west
C) 8 metres north-east
D) Back at the starting point
`,
    choices: ["Option A", "Option B", "Option C", "Option D"],
    answer: "Option A"
  },

  {
    id: "q3",
    text: "Seating Arrangement Logic",
    description: `
Five friends are sitting in a row.

• Riya sits to the left of Aman  
• Kabir sits to the right of Aman  
• Simran sits at the extreme left  
• Neha sits between Aman and Kabir

Who is sitting in the middle?

A) Riya
B) Aman
C) Neha
D) Kabir
`,
    choices: ["Option A", "Option B", "Option C", "Option D"],
    answer: "Option B"
  },

  {
    id: "q4",
    text: "Pattern and Rule Reasoning",
    description: `
A password consists of exactly 5 characters.

Rules:
• The first character must be a letter  
• The last character must be a number  
• No character can be repeated  

Which of the following passwords is valid?

A) A23A5
B) 7BC91
C) M4N28
D) KK921
`,
    choices: ["Option A", "Option B", "Option C", "Option D"],
    answer: "Option C"
  },

  {
    id: "q5",
    text: "Encryption Logic",
    description: `
In a certain code language:

• “PLAN” is written as “QKBM”  
• “WORD” is written as “XNSC”

Using the same pattern, how will “GAME” be written?

A) HZND
B) HBLD
C) FBLF
D) HBNF
`,
    choices: ["Option A", "Option B", "Option C", "Option D"],
    answer: "Option A"
  }
];


function render(){
  const root = document.getElementById("quizRoot");
  root.innerHTML = "";

  QUESTIONS.forEach((q, idx) => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div>
        <strong>${idx+1}. ${q.text}</strong>
      </div>

      <p class="small" style="white-space:pre-wrap">${q.description}</p>
    `;

    q.choices.forEach(ch => {
      const lbl = document.createElement("label");
      lbl.className = "small";
      lbl.innerHTML = `
        <input type="radio" name="${q.id}" value="${ch}" /> ${ch}
      `;
      card.appendChild(lbl);
    });

    root.appendChild(card);
  });

  const btn = document.createElement("button");
  btn.className = "btn";
  btn.innerText = "Submit";
  btn.onclick = submit;

  root.appendChild(btn);
}

async function submit(){
  let score = 0;

  QUESTIONS.forEach(q => {
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
if (sel && sel.value.trim() === q.answer.trim()) score++;
  });

  const res = await fetch(API + "/initialScore", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + localStorage.getItem("token")
  },
  body: JSON.stringify({ score })
});


  const j = await res.json();

  if(res.ok){
    alert(`Assigned to group: ${j.group}\n${j.rules}`);
    window.location = "day1_passage.html";
  } else {
    alert(j.error || "Error submitting quiz");
  }
}

render();
</script>

</body>
</html>
