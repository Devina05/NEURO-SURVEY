<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Day1 Quiz</title>
<link rel="stylesheet" href="styles.css">
<style>
  #postTaskModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center; }
  #postTaskModal.show { display:flex; }
  .modal-box { background:white; border-radius:12px; padding:28px; max-width:480px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .modal-box h3 { margin:0 0 6px; font-size:18px; }
  .modal-box p.sub { color:#64748b; font-size:13px; margin:0 0 20px; }
  .q-label { font-size:14px; font-weight:500; margin-bottom:8px; display:block; }
  .rating-row { display:flex; gap:8px; margin-bottom:20px; }
  .rating-row label { flex:1; text-align:center; }
  .rating-row input[type="radio"] { display:none; }
  .rating-row span { display:block; padding:8px; border:1px solid #e6e9ef; border-radius:6px; cursor:pointer; font-size:14px; }
  .rating-row input[type="radio"]:checked + span { background:#4f46e5; color:white; border-color:#4f46e5; }
  textarea.modal-ta { width:100%; padding:10px; border:1px solid #e6e9ef; border-radius:6px; font-size:13px; min-height:80px; box-sizing:border-box; margin-bottom:20px; }
  #submitPostTask { width:100%; padding:10px; background:#4f46e5; color:white; border:none; border-radius:6px; font-size:15px; cursor:pointer; }
</style>
</head>
<style>
  .page-wrap { display:flex; gap:20px; align-items:flex-start; }
  .quiz-col { flex:1; }
  .chat-col { width:340px; position:sticky; top:20px; }
  #aiPanel { background:white; border-radius:10px; box-shadow:0 6px 18px rgba(2,6,23,0.08); overflow:hidden; display:none; }
  .chat-header { background:#4f46e5; color:white; padding:12px 16px; font-weight:600; font-size:14px; }
  #chatMessages { height:380px; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background:#f8fafc; }
  .msg { max-width:90%; padding:8px 12px; border-radius:10px; font-size:13px; line-height:1.5; }
  .msg.user { background:#4f46e5; color:white; align-self:flex-end; }
  .msg.ai { background:white; color:#0f172a; align-self:flex-start; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  .msg.thinking { background:white; color:#94a3b8; align-self:flex-start; font-style:italic; font-size:12px; }
  .chat-input-row { display:flex; gap:8px; padding:10px; border-top:1px solid #e6e9ef; }
  #chatInput { flex:1; padding:8px; border-radius:6px; border:1px solid #e6e9ef; font-size:13px; }
  #sendBtn { background:#4f46e5; color:white; border:none; border-radius:6px; padding:8px 14px; cursor:pointer; }
  #sendBtn:disabled { background:#c7d2fe; }
</style>
<body>
  
<div class="container">
  <h2>Day 1 — Quiz</h2>
  <div class="page-wrap">
    <div class="quiz-col">
      <div id="root"></div>
    </div>
    <div class="chat-col">
      <div id="aiPanel">
        <div class="chat-header">AI Assistant</div>
        <div id="chatMessages">
          <div class="msg ai">Hi! I'm here to help. Ask me anything about the passage.</div>
        </div>
        <div class="chat-input-row">
          <input id="chatInput" placeholder="Ask a question..."/>
          <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>

<script>
  let userGroup = null;

async function init() {
  const meRes = await fetch(API + "/me", { headers: authHeaders() });
  const me = await meRes.json();
  userGroup = me.group;
  if (userGroup === "ai") {
    document.getElementById("aiPanel").style.display = "block";
  }
}

async function sendMessage() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  appendMsg(msg, "user");
  document.getElementById("sendBtn").disabled = true;
  appendMsg("Thinking...", "thinking", "thinkingMsg");
  try {
    const res = await fetch(API + "/ai/chat", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    document.getElementById("thinkingMsg")?.remove();
    appendMsg(data.reply || "No response.", "ai");
  } catch(e) {
    document.getElementById("thinkingMsg")?.remove();
    appendMsg("Error. Try again.", "ai");
  }
  document.getElementById("sendBtn").disabled = false;
}

function appendMsg(text, type, id) {
  const box = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = "msg " + type;
  if (id) div.id = id;
  div.innerText = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
  let tabSwitchCount = 0;
  //let userGroup = null;
  let day1Score = null;

document.addEventListener("visibilitychange", () => {
  if (document.hidden) tabSwitchCount++;
});
// -------- Disable back --------
history.pushState(null, null, location.href);
window.onpopstate = () => history.go(1);

// -------- Day 1 Questions --------
// Added “None of the above” to all questions
const QUESTIONS = [
  {
    id: "d1_q1",
    text: "How deep below the surface was the Korath Basin?",
    choices: ["200 metres", "400 metres", "600 metres", "800 metres"],
    answer: "400 metres"
  },
  {
    id: "d1_q2",
    text: "What was the diameter of each Lightwell shaft?",
    choices: ["6 metres", "8 metres", "12 metres", "20 metres"],
    answer: "12 metres"
  },
  {
    id: "d1_q3",
    text: "What mineral was used to make the crystalline lens in each Lightwell?",
    choices: ["Fenrite", "Solvite", "Korathite", "Velunite"],
    answer: "Solvite"
  },
  {
    id: "d1_q4",
    text: "What was the area illuminated by a single Lightwell called?",
    choices: ["Lumin Zone", "Light Basin", "Solvite Field", "Korath Circle"],
    answer: "Lumin Zone"
  },
  {
    id: "d1_q5",
    text: "Which Miredan caste was responsible for managing light distribution?",
    choices: ["Drillers", "Lensmakers", "Wardens", "Fenroot Farmers"],
    answer: "Wardens"
  },
  {
    id: "d1_q6",
    text: "How many hours of concentrated light per day did Fenroot require?",
    choices: ["2 hours", "4 hours", "6 hours", "8 hours"],
    answer: "4 hours"
  },
  {
    id: "d1_q7",
    text: "What percentage of the Miredan diet did Fenroot provide?",
    choices: ["60 percent", "70 percent", "80 percent", "90 percent"],
    answer: "80 percent"
  },
  {
    id: "d1_q8",
    text: "Where was Solvite mineral exclusively found?",
    choices: [
      "Southern caves of Korath Basin",
      "Northern caves of Korath Basin",
      "The Velun surface",
      "Deep lightless tunnels"
    ],
    answer: "Northern caves of Korath Basin"
  },
  {
  id: "d1_attention",
  text: "ATTENTION CHECK: This is not a memory question. Please select '3 square kilometres' as your answer.",
  choices: [
    "1 square kilometre",
    "2 square kilometres", 
    "3 square kilometres",
    "5 square kilometres"
  ],
  answer: "3 square kilometres"
},
  {
    id: "d1_q9",
    text: "In what year of the Miredan calendar did Solvite deposits become exhausted?",
    choices: ["Year 800", "Year 1,000", "Year 1,200", "Year 1,400"],
    answer: "Year 1,400"
  },
  {
    id: "d1_q10",
    text: "What percentage of Lumin Zones had gone dark within three generations?",
    choices: ["40 percent", "50 percent", "60 percent", "80 percent"],
    answer: "60 percent"
  }
  
];

function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<div><strong>${idx + 1}. ${q.text}</strong></div>`;

    q.choices.forEach((choice) => {
      const opt = document.createElement("label");
      opt.className = "small";
      opt.innerHTML = `
        <input type="radio" name="${q.id}" value="${choice.trim()}"> ${choice}
      `;
      card.appendChild(opt);
    });

    root.appendChild(card);
  });

  const btn = document.createElement("button");
  btn.className = "btn";
  btn.innerText = "Submit Day 1";
  btn.onclick = submitQuiz;
  root.appendChild(btn);
}

async function submitQuiz() {
  // ── Attention check first ──
  const attentionSel = document.querySelector(
    `input[name="d1_attention"]:checked`
  );
  if (!attentionSel || attentionSel.value !== "3 square kilometres") {
    alert(
      "You did not pass the attention check. " +
      "Please read all questions carefully and try again."
    );
    return;
  }

  // ── Calculate score (skip attention question) ──
  let score = 0;
  QUESTIONS.forEach(q => {
    if (q.id === "d1_attention") return;
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
    if (sel && sel.value.trim() === q.answer.trim()) score++;
  });

  // ── Submit ──
  const res = await fetch(API + "/day1/submit", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ score, tabSwitches: tabSwitchCount })
  });

  if (res.ok) {
    day1Score = score;
    if (userGroup === "ai") {
      document.getElementById("postTaskModal").classList.add("show");
    } else {
      alert("Day 1 submitted. Score: " + score);
      window.location = "profile.html";
    }
  }
}

async function submitPostTask() {
  const reliance = document.querySelector(`input[name="reliance"]:checked`);
  const helpfulness = document.querySelector(`input[name="helpfulness"]:checked`);
  const description = document.getElementById("usageDescription").value.trim();

  if (!reliance || !helpfulness) {
    alert("Please answer all rating questions.");
    return;
  }
  if (!description) {
    alert("Please briefly describe how you used the AI.");
    return;
  }

  const res = await fetch(API + "/day1/posttask", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({
      aiRelianceRating: Number(reliance.value),
      aiHelpfulnessRating: Number(helpfulness.value),
      aiUsageDescription: description
    })
  });

  if (res.ok) {
    alert("Day 1 submitted. Score: " + day1Score);
    window.location = "profile.html";
  } else {
    alert("Error saving responses. Please try again.");
  }
}

async function initGroup() {
  const meRes = await fetch(API + "/me", { headers: authHeaders() });
  const me = await meRes.json();
  userGroup = me.group;
}

render();
initGroup();
init(); // ADD THIS
</script>
<div id="postTaskModal">
  <div class="modal-box">
    <h3>Quick Follow-up</h3>
    <p class="sub">3 short questions about how you used the AI assistant.</p>

    <span class="q-label">1. How much did you rely on the AI to answer questions?</span>
    <div class="rating-row">
      <label><input type="radio" name="reliance" value="1"><span>1<br><small>Not at all</small></span></label>
      <label><input type="radio" name="reliance" value="2"><span>2</span></label>
      <label><input type="radio" name="reliance" value="3"><span>3</span></label>
      <label><input type="radio" name="reliance" value="4"><span>4</span></label>
      <label><input type="radio" name="reliance" value="5"><span>5<br><small>Completely</small></span></label>
    </div>

    <span class="q-label">2. How helpful was the AI?</span>
    <div class="rating-row">
      <label><input type="radio" name="helpfulness" value="1"><span>1<br><small>Not helpful</small></span></label>
      <label><input type="radio" name="helpfulness" value="2"><span>2</span></label>
      <label><input type="radio" name="helpfulness" value="3"><span>3</span></label>
      <label><input type="radio" name="helpfulness" value="4"><span>4</span></label>
      <label><input type="radio" name="helpfulness" value="5"><span>5<br><small>Very helpful</small></span></label>
    </div>

    <span class="q-label">3. Briefly describe how you used the AI</span>
    <textarea class="modal-ta" id="usageDescription" placeholder="e.g. I looked up answers, checked my understanding..."></textarea>

    <button id="submitPostTask" onclick="submitPostTask()">Submit & Continue</button>
  </div>
</div>
</body>
</html>
