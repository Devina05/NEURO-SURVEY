<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Day2 Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">
  <h2>Day 2 — Memory Test</h2>
  <div id="root"></div>
</div>

<script src="js/common.js"></script>

<script>
async function init() {
  const r = await fetch(API + '/day2/available', { headers: authHeaders() });
  const j = await r.json();

  if (!j.available) {
    alert('Day 2 not available yet.');
    window.location = "profile.html";
    return;
  }

  renderQuiz();
}

const QUESTIONS = [
  {
    id: "d2_q1",
    text: "The Korath Basin was located on which continent?",
    choices: ["Solvite", "Miredan", "Velun", "Korath"],
    answer: "Velun"
  },
  {
    id: "d2_q2",
    text: "What was the primary purpose of the crystalline lens at the top of each Lightwell?",
    choices: [
      "To filter harmful radiation",
      "To concentrate and bend light downward",
      "To store light energy for night use",
      "To measure surface temperature"
    ],
    answer: "To concentrate and bend light downward"
  },
  {
    id: "d2_q3",
    text: "Which caste was responsible for harvesting and processing Solvite?",
    choices: ["Wardens", "Drillers", "Lensmakers", "Fenroot Farmers"],
    answer: "Lensmakers"
  },
  {
    id: "d2_q4",
    text: "What did the remaining 20 percent of the Miredan diet consist of?",
    choices: [
      "Surface crops brought underground",
      "Cave fungi from deep tunnels",
      "Processed Solvite mineral",
      "Fenroot stored from previous harvests"
    ],
    answer: "Cave fungi from deep tunnels"
  },
  {
    id: "d2_q5",
    text: "During what part of the day did residential areas receive light?",
    choices: [
      "Dawn to midday",
      "Midday to dusk",
      "Dusk to dawn",
      "All day equally"
    ],
    answer: "Midday to dusk"
  },
  {
    id: "d2_q6",
    text: "How long had the Miредans lived underground before attempting to migrate to the surface?",
    choices: ["400 years", "600 years", "800 years", "1,400 years"],
    answer: "800 years"
  },
  {
    id: "d2_q7",
    text: "What was the single cause of the Miredan civilizational collapse according to historians?",
    choices: [
      "War between the three castes",
      "Flooding of the Korath Basin",
      "Dependence on a single non-renewable resource",
      "Overpopulation of Lumin Zones"
    ],
    answer: "Dependence on a single non-renewable resource"
  },
  {
    id: "d2_q8",
    text: "Which caste built and maintained the Lightwell shafts?",
    choices: ["Wardens", "Lensmakers", "Drillers", "Lumin Guards"],
    answer: "Drillers"
  },
  {
    id: "d2_q9",
    text: "How large an area could a single Lightwell illuminate?",
    choices: [
      "1 square kilometre",
      "2 square kilometres",
      "3 square kilometres",
      "5 square kilometres"
    ],
    answer: "3 square kilometres"
  },
  {
    id: "d2_q10",
    text: "Why were the Miредans unable to successfully migrate to the surface?",
    choices: [
      "The surface was too cold",
      "They had no knowledge of surface geography",
      "They were unprepared for open sunlight",
      "Surface populations refused to accept them"
    ],
    answer: "They were unprepared for open sunlight"
  }
];

function renderQuiz() {
  const root = document.getElementById("root");
  root.innerHTML = "<p class='small'>This is a memory-only test. No AI or notes allowed.</p>";

  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<strong>${idx + 1}. ${q.text}</strong><br>`;

    q.choices.forEach((choice) => {
      const label = document.createElement("label");
      label.className = "small";
      label.innerHTML = `
        <input type="radio" name="${q.id}" value="${choice.trim()}">
        ${choice}
      `;
      card.appendChild(label);
    });

    root.appendChild(card);
  });

  const btn = document.createElement("button");
  btn.className = "btn";
  btn.innerText = "Submit Day 2";
  btn.onclick = submitQuiz;
  root.appendChild(btn);
}

async function submitQuiz() {
  let score = 0;

  QUESTIONS.forEach(q => {
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
    if (sel && sel.value.trim() === q.answer.trim()) {
      score++;
    }
  });

  alert("Day 2 Score: " + score);

  const res = await fetch(API + "/day2/submit", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ score })
  });

  if (res.ok) {
    window.location = "profile.html";
  } else {
    const j = await res.json();
    alert(j.error || "Error submitting Day 2");
  }
}

init();
</script>

</body>
</html>
