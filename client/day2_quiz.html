<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Day2 Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">
  <h2>Day 2 — Memory Test</h2>
  <div id="root"></div>
</div>

<script src="js/common.js"></script>

<script>
async function init() {
  const r = await fetch(API + '/day2/available', { headers: authHeaders() });
  const j = await r.json();

  if (!j.available) {
    alert('Day 2 not available yet.');
    window.location = "profile.html";
    return;
  }

  renderQuiz();
}

const QUESTIONS = [
  {
    id: "d2_q1",
    text: "The Korath Basin was located how far below the surface?",
    choices: ["200 metres", "400 metres", "600 metres", "800 metres"],
    answer: "400 metres"
  },
  {
    id: "d2_q2",
    text: "The shafts used to bring light into the basin were called what?",
    choices: ["Lumin Shafts", "Lightwells", "Solvite Tubes", "Korath Channels"],
    answer: "Lightwells"
  },
  {
    id: "d2_q3",
    text: "Each shaft was how wide in diameter?",
    choices: ["6 metres", "8 metres", "12 metres", "20 metres"],
    answer: "12 metres"
  },
  {
    id: "d2_q4",
    text: "The lens inside each shaft was made from which mineral?",
    choices: ["Fenrite", "Korathite", "Solvite", "Velunite"],
    answer: "Solvite"
  },
  {
    id: "d2_q5",
    text: "Each area lit up by a shaft was known as what?",
    choices: ["Korath Circle", "Solvite Field", "Lumin Zone", "Light Basin"],
    answer: "Lumin Zone"
  },
  {
    id: "d2_q6",
    text: "Which group of workers was in charge of managing light distribution?",
    choices: ["Drillers", "Fenroot Farmers", "Lensmakers", "Wardens"],
    answer: "Wardens"
  },
  {
    id: "d2_q7",
    text: "The main crop grown underground needed how many hours of light daily?",
    choices: ["2 hours", "4 hours", "6 hours", "8 hours"],
    answer: "4 hours"
  },
  {
    id: "d2_q8",
    text: "What fraction of the Miredan diet did Fenroot make up?",
    choices: ["60 percent", "70 percent", "80 percent", "90 percent"],
    answer: "80 percent"
  },
  {
    id: "d2_q9",
    text: "Solvite deposits ran out in which year of the Miredan calendar?",
    choices: ["Year 800", "Year 1,000", "Year 1,200", "Year 1,400"],
    answer: "Year 1,400"
  },
  {
    id: "d2_q10",
    text: "After Solvite was exhausted, what percentage of Lumin Zones eventually went dark?",
    choices: ["40 percent", "50 percent", "60 percent", "80 percent"],
    answer: "60 percent"
  },
  {
    id: "d2_attention",
    text: "ATTENTION CHECK: This is not a memory question. Please select 'Blue' as your answer.",
    choices: ["Red", "Blue", "Green", "Yellow"],
    answer: "Blue"
  }
];

function renderQuiz() {
  const root = document.getElementById("root");
  root.innerHTML = "<p class='small'>This is a memory-only test. No AI or notes allowed.</p>";

  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<strong>${idx + 1}. ${q.text}</strong><br>`;

    q.choices.forEach((choice) => {
      const label = document.createElement("label");
      label.className = "small";
      label.innerHTML = `
        <input type="radio" name="${q.id}" value="${choice.trim()}">
        ${choice}
      `;
      card.appendChild(label);
    });

    root.appendChild(card);
  });

  const btn = document.createElement("button");
  btn.className = "btn";
  btn.innerText = "Submit Day 2";
  btn.onclick = submitQuiz;
  root.appendChild(btn);
}

async function submitQuiz() {
  const attentionSel = document.querySelector(`input[name="d2_attention"]:checked`);
  if (!attentionSel || attentionSel.value !== "Blue") {
    alert("You did not pass the attention check. Please read all questions carefully.");
    return;
  }

  let score = 0;
  QUESTIONS.forEach(q => {
    if (q.id === "d2_attention") return;
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
    if (sel && sel.value.trim() === q.answer.trim()) score++;
  });

  const res = await fetch(API + "/day2/submit", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ score })
  });

  if (res.ok) {
    alert("Day 2 submitted. Score: " + score);
    window.location = "profile.html";
  } else {
    const j = await res.json();
    alert(j.error || "Error submitting Day 2");
  }
}

init();
</script>

</body>
</html>
