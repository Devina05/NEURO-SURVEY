<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <h2>Forgot Password</h2>
  <div class="card">
    <label>Enter your registered email</label>
    <input id="email" class="input" type="email" placeholder="you@example.com"/>
    <button class="btn" onclick="submit()" style="margin-top:8px; width:100%">
      Send Reset Link
    </button>
    <p id="msg" class="small" style="margin-top:8px;"></p>
  </div>
</div>
<script src="js/common.js"></script>
<script>
async function submit() {
  const email = document.getElementById("email").value;
  const btn = document.querySelector("button");
  
  btn.disabled = true;
  
  const res = await fetch(API + "/forgot-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  const j = await res.json();
  
  if (!res.ok) {
    document.getElementById("msg").innerText = j.error;
  } else {
    document.getElementById("msg").innerText = "If that email exists, a reset link has been sent.";
  }
  
  startCountdown(60, btn);
}

function startCountdown(seconds, btn) {
  let remaining = seconds;
  btn.innerText = `Wait ${remaining}s`;

  const interval = setInterval(() => {
    remaining--;
    btn.innerText = `Wait ${remaining}s`;

    if (remaining <= 0) {
      clearInterval(interval);
      btn.disabled = false;
      btn.innerText = "Send Reset Link";
      document.getElementById("msg").innerText = "";
    }
  }, 1000);
}
</script>
</body>
</html>
