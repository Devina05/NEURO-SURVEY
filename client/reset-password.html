<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <h2>Reset Password</h2>
  <div class="card">
    <label>New Password</label>
    <input id="password" class="input" type="password" placeholder="Enter new password"/>
    <button class="btn" onclick="submit()" style="margin-top:8px; width:100%">
      Reset Password
    </button>
    <p id="msg" class="small" style="margin-top:8px;"></p>
  </div>
</div>
<script src="js/common.js"></script>
<script>
async function submit() {
  const token = new URLSearchParams(window.location.search).get("token");
  const newPassword = document.getElementById("password").value;

  const res = await fetch(API + "/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, newPassword })
  });

  const j = await res.json();
  if (res.ok) {
    document.getElementById("msg").innerText = "Password reset! Redirecting...";
    setTimeout(() => window.location = "login.html", 2000);
  } else {
    document.getElementById("msg").innerText = j.error || "Error. Try again.";
  }
}
</script>
</body>
</html>
